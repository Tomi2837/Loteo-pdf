<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loteo de mercaderia</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:white;
}

.page{
width:210mm;
height:297mm;
padding:8mm;
box-sizing:border-box;
}

.header{
display:grid;
grid-template-columns:70mm 50mm 1fr;
border-top:6px solid #2d292b;
}

.header div{
border:1px solid #555;
height:25mm;
display:flex;
align-items:center;
justify-content:center;
}

.logo{
max-height:18mm;
}

.codigo{
font-size:20px;
font-weight:700;
}

.sub{
font-size:12px;
}

.box{
margin-top:8mm;
border:1px solid #555;
height:250mm;
padding:8mm;
box-sizing:border-box;
}

.titulo{
font-size:18px;
font-weight:700;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

td,th{
border:1px solid #999;
padding:6px;
}

th{
background:#eee;
}

</style>

</head>

<body>

<div class="page">

<div class="header">

<div>
<img src="logo.png" class="logo">
</div>

<div>
<div>
<div class="codigo">FO1LT01</div>
<div class="sub">Loteo de mercaderia</div>
</div>
</div>

<div></div>

</div>

<div class="box">

<div id="infoA" class="titulo"></div>

<table id="tabla">

<tr>
<th>Cantidad</th>
<th>Producto</th>
<th>Color</th>
<th>Cliente</th>
<th>Remito</th>
<th>Lote</th>
</tr>

</table>

</div>

</div>

<script>

function getParametro(nombre){
const url = new URL(window.location.href);
return decodeURIComponent(url.searchParams.get(nombre) || "");
}

const data = getParametro("data");

if(data){

const lineas = data.split("\n");

document.getElementById("infoA").innerText = lineas[0];

const tabla = document.getElementById("tabla");

for(let i=1;i<lineas.length;i++){

const linea = lineas[i];

if(!linea.trim()) continue;

const partes = linea.split(" ");

const cantidad = partes[0];
const lote = partes.pop();
const remito = partes.pop();
const cliente = partes.slice(-2).join(" ");
const color = partes[partes.length-3];
const producto = partes.slice(1, partes.length-3).join(" ");

const fila = document.createElement("tr");

fila.innerHTML = `
<td>${cantidad}</td>
<td>${producto}</td>
<td>${color}</td>
<td>${cliente}</td>
<td>${remito}</td>
<td>${lote}</td>
`;

tabla.appendChild(fila);

}

}

window.onload = function(){
setTimeout(function(){
window.print();
},700);
}

</script>

</body>
</html>
