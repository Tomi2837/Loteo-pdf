<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loteo de mercaderia</title>

<style>
*{
box-sizing:border-box;
}

html,body{
margin:0;
padding:0;
background:#ffffff;
font-family:Arial, Helvetica, sans-serif;
color:#111111;
}

body{
width:210mm;
margin:0 auto;
padding:4mm;
}

.page{
width:100%;
min-height:289mm;
background:#ffffff;
}

.header-image{
width:100%;
display:block;
margin:0;
}

.content-box{
margin-top:7mm;
border:0.35mm solid #707070;
min-height:257mm;
padding:9mm 7mm 8mm 7mm;
background:#ffffff;
}

.info-a{
font-size:10.5pt;
font-weight:800;
margin:0 0 5mm 0;
white-space:pre-wrap;
word-break:break-word;
text-transform:uppercase;
}

.tabla{
width:100%;
border-collapse:collapse;
table-layout:fixed;
font-size:8.2pt;
}

.tabla th,
.tabla td{
border:0.3mm solid #a3a3a3;
padding:1.7mm 1.4mm;
vertical-align:middle;
line-height:1.1;
white-space:nowrap;
overflow:hidden;
text-overflow:clip;
}

.tabla th{
background:#f1f1f1;
font-weight:700;
text-align:center;
font-size:7.9pt;
}

.tabla td{
text-align:left;
}

.col-cantidad{width:9%;}
.col-producto{width:27%;}
.col-color{width:9%;}
.col-cliente{width:17%;}
.col-remito{width:9%;}
.col-lote{width:13%;}
.col-glicerina{width:8%;}
.col-envases{width:8%;}

.estado{
font-size:9pt;
margin-top:5mm;
color:#555555;
}

@media print{
@page{
size:A4 portrait;
margin:0;
}

html,body{
width:210mm;
height:297mm;
}

body{
padding:4mm;
margin:0;
}

.estado{
display:none;
}
}
</style>
</head>
<body>

<div class="page">

<img class="header-image" src="header.png" alt="Encabezado">

<div class="content-box">
<div id="infoA" class="info-a">Cargando...</div>

<table class="tabla" id="tabla" style="display:none;">
<thead>
<tr>
<th class="col-cantidad">Cantidad</th>
<th class="col-producto">Producto</th>
<th class="col-color">Color</th>
<th class="col-cliente">Cliente</th>
<th class="col-remito">Remito</th>
<th class="col-lote">Lote</th>
<th class="col-glicerina">Glicerina</th>
<th class="col-envases">Envases</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div id="estado" class="estado"></div>
</div>

</div>

<script>
const SPREADSHEET_ID = "1MJfboS5VZlCknenj2ZTkiNlh1EugOs37zVz2iQc0iX8";
const SHEET_NAME = "Resumen loteos";

function getParametro(nombre){
const url = new URL(window.location.href);
return decodeURIComponent(url.searchParams.get(nombre) || "").trim();
}

function escaparHTML(texto){
return String(texto ?? "")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;");
}

function setEstado(texto){
document.getElementById("estado").textContent = texto || "";
}

function construirUrlGviz(){
const query = encodeURIComponent("select A,B");
return `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?sheet=${encodeURIComponent(SHEET_NAME)}&tq=${query}`;
}

function leerValorCelda(celda){
if(!celda) return "";
if(typeof celda.v === "string") return celda.v.trim();
if(celda.v === null || celda.v === undefined) return "";
return String(celda.v).trim();
}

async function obtenerResumenes(){
const response = await fetch(construirUrlGviz());
if(!response.ok){
throw new Error("No se pudo leer la hoja");
}

const text = await response.text();
const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\);/);

if(!match || !match[1]){
throw new Error("Respuesta invalida de Google Sheets");
}

const json = JSON.parse(match[1]);
const rows = (json.table && json.table.rows) ? json.table.rows : [];

return rows.map(row => {
const c = row.c || [];
return {
titulo: leerValorCelda(c[0]),
texto: leerValorCelda(c[1])
};
});
}

function agregarFila(tbody, partes){
const fila = document.createElement("tr");
fila.innerHTML = `
<td>${escaparHTML(partes[0] || "")}</td>
<td>${escaparHTML(partes[1] || "")}</td>
<td>${escaparHTML(partes[2] || "")}</td>
<td>${escaparHTML(partes[3] || "")}</td>
<td>${escaparHTML(partes[4] || "")}</td>
<td>${escaparHTML(partes[5] || "")}</td>
<td>${escaparHTML(partes[6] || "")}</td>
<td>${escaparHTML(partes[7] || "")}</td>
`;
tbody.appendChild(fila);
}

function cargarTablaDesdeTexto(texto){
const tabla = document.getElementById("tabla");
const tbody = tabla.querySelector("tbody");

tbody.innerHTML = "";

const lineas = texto
.replace(/\r/g,"")
.split("\n")
.map(x => x.trim())
.filter(Boolean);

lineas.forEach(linea => {
const partes = linea.split("*").map(x => x.trim());
if(partes.length < 8) return;
agregarFila(tbody, partes);
});

if(tbody.children.length){
tabla.style.display = "table";
}
}

async function iniciar(){
const id = getParametro("id");
const infoA = document.getElementById("infoA");

if(!id){
infoA.textContent = "Falta el parametro id";
setEstado("Usa un link tipo ?id=Marzo%202026");
return;
}

setEstado("Cargando datos...");

try{
const resumenes = await obtenerResumenes();
const fila = resumenes.find(x => x.titulo === id);

if(!fila){
infoA.textContent = "No encontrado";
setEstado("No existe una fila en '" + SHEET_NAME + "' con A = " + id);
return;
}

infoA.textContent = fila.titulo;
cargarTablaDesdeTexto(fila.texto);
setEstado("Listo");

setTimeout(function(){
window.print();
},700);

}catch(error){
infoA.textContent = "Error al cargar";
setEstado(error.message || "No se pudo cargar la hoja");
}
}

window.addEventListener("load", iniciar);
</script>

</body>
</html>
