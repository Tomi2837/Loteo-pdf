<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loteo de mercaderia</title>

<style>
*{
box-sizing:border-box;
}

html,body{
margin:0;
padding:0;
background:#ffffff;
font-family:Arial, Helvetica, sans-serif;
color:#111111;
}

body{
width:210mm;
margin:0 auto;
padding:4mm;
}

.page{
width:100%;
min-height:289mm;
background:#ffffff;
}

.header-image{
width:100%;
display:block;
margin:0;
}

.content-box{
margin-top:7mm;
border:0.35mm solid #707070;
min-height:257mm;
padding:9mm 7mm 8mm 7mm;
background:#ffffff;
}

.info-a{
font-size:10.5pt;
font-weight:800;
margin:0 0 5mm 0;
white-space:pre-wrap;
word-break:break-word;
text-transform:uppercase;
}

.tabla{
width:100%;
border-collapse:collapse;
table-layout:fixed;
font-size:8.5pt;
}

.tabla th,
.tabla td{
border:0.3mm solid #a3a3a3;
padding:1.8mm 1.6mm;
vertical-align:middle;
line-height:1.1;
white-space:nowrap;
overflow:hidden;
text-overflow:clip;
}

.tabla th{
background:#f1f1f1;
font-weight:700;
text-align:center;
font-size:8.3pt;
}

.tabla td{
text-align:left;
}

.col-cantidad{width:10%;}
.col-producto{width:25%;}
.col-color{width:10%;}
.col-cliente{width:17%;}
.col-remito{width:10%;}
.col-lote{width:13%;}
.col-glicerina{width:7.5%;}
.col-envases{width:7.5%;}

@media print{
@page{
size:A4 portrait;
margin:0;
}

html,body{
width:210mm;
height:297mm;
}

body{
padding:4mm;
margin:0;
}
}
</style>
</head>
<body>

<div class="page">

<img class="header-image" src="header.png" alt="Encabezado">

<div class="content-box">
<div id="infoA" class="info-a"></div>

<table class="tabla" id="tabla" style="display:none;">
<thead>
<tr>
<th class="col-cantidad">Cantidad</th>
<th class="col-producto">Producto</th>
<th class="col-color">Color</th>
<th class="col-cliente">Cliente</th>
<th class="col-remito">Remito</th>
<th class="col-lote">Lote</th>
<th class="col-glicerina">Glicerina</th>
<th class="col-envases">Envases</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script>
function getParametro(nombre){
const url = new URL(window.location.href);
return decodeURIComponent(url.searchParams.get(nombre) || "");
}

function escaparHTML(texto){
return String(texto)
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;");
}

function valorSeguro(valor){
return valor ? valor : "";
}

function cargarContenido(){
const data = getParametro("data");
if(!data) return;

const lineas = data
.replace(/\r/g,"")
.split("\n")
.map(x => x.trim())
.filter(Boolean);

if(!lineas.length) return;

const titulo = lineas[0];
const tabla = document.getElementById("tabla");
const tbody = tabla.querySelector("tbody");

document.getElementById("infoA").textContent = titulo;

for(let i = 1; i < lineas.length; i++){
const linea = lineas[i];
const partes = linea.split("*").map(x => x.trim());

if(partes.length < 8) continue;

const cantidad = valorSeguro(partes[0]);
const producto = valorSeguro(partes[1]);
const color = valorSeguro(partes[2]);
const cliente = valorSeguro(partes[3]);
const remito = valorSeguro(partes[4]);
const lote = valorSeguro(partes[5]);
const glicerina = valorSeguro(partes[6]);
const envases = valorSeguro(partes[7]);

const fila = document.createElement("tr");
fila.innerHTML = `
<td>${escaparHTML(cantidad)}</td>
<td>${escaparHTML(producto)}</td>
<td>${escaparHTML(color)}</td>
<td>${escaparHTML(cliente)}</td>
<td>${escaparHTML(remito)}</td>
<td>${escaparHTML(lote)}</td>
<td>${escaparHTML(glicerina)}</td>
<td>${escaparHTML(envases)}</td>
`;
tbody.appendChild(fila);
}

tabla.style.display = "table";
}

window.addEventListener("load", function(){
cargarContenido();

setTimeout(function(){
window.print();
},700);
});
</script>

</body>
</html>
