<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Loteo</title>

<style>

body{
font-family:Arial;
width:210mm;
margin:auto;
padding:4mm;
}

.header-image{
width:100%;
}

.content-box{
margin-top:6mm;
border:1px solid #777;
padding:8mm;
min-height:250mm;
}

.info-a{
font-size:14px;
font-weight:bold;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

th,td{
border:1px solid #aaa;
padding:5px;
white-space:nowrap;
}

th{
background:#f2f2f2;
}

</style>
</head>
<body>

<img class="header-image" src="header.png">

<div class="content-box">

<div id="infoA" class="info-a"></div>

<table id="tabla" style="display:none">

<tr>
<th>Cantidad</th>
<th>Producto</th>
<th>Color</th>
<th>Cliente</th>
<th>Lote</th>
<th>Lote Glicerina</th>
<th>Lote Envases</th>
</tr>

</table>

</div>

<script>

function getParametro(nombre){
const url = new URL(window.location.href);
return decodeURIComponent(url.searchParams.get(nombre) || "");
}

const data = getParametro("data");

if(data){

const lineas = data.split("\n");

document.getElementById("infoA").innerText = lineas[0];

const tabla = document.getElementById("tabla");

for(let i=1;i<lineas.length;i++){

const partes = lineas[i].split(" ");

const cantidad = partes[0];
const loteEnvases = partes[partes.length-1];
const loteGlicerina = partes[partes.length-2];
const lote = partes[partes.length-3];
const cliente = partes.slice(partes.length-6, partes.length-4).join(" ");
const color = partes[partes.length-7];
const producto = partes.slice(1, partes.length-7).join(" ");

const fila = document.createElement("tr");

fila.innerHTML = `
<td>${cantidad}</td>
<td>${producto}</td>
<td>${color}</td>
<td>${cliente}</td>
<td>${lote}</td>
<td>${loteGlicerina}</td>
<td>${loteEnvases}</td>
`;

tabla.appendChild(fila);

}

tabla.style.display="table";

}

window.onload=function(){
setTimeout(function(){
window.print();
},600);
}

</script>

</body>
</html>
